<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Editor</title>
    <link rel="stylesheet" href="assets/css/editor.css">
    <style>
        /* We'll also include some basic styles here for the editor container */
        :root {
            --bg-color: #0a0a0a;
            --text-color: #e0e0e0;
            --accent-color: #4cc9f0;
            --secondary-accent: #f72585;
            --border-color: #333;
            --input-bg: #1a1a1a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        header h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
        }
        .editor-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .editor-panel {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
        }
        .toolbar button {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toolbar button:hover {
            background: var(--border-color);
        }
        .toolbar button.active {
            background: var(--accent-color);
            color: var(--bg-color);
        }
        .editor-input, .editor-preview {
            flex: 1;
            min-height: 300px;
            padding: 15px;
            overflow-y: auto;
        }
        .editor-input {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.6;
            background: var(--input-bg);
            color: var(--text-color);
            border: none;
            resize: none;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }
        .editor-preview {
            background: var(--input-bg);
            color: var(--text-color);
            line-height: 1.7;
            word-wrap: break-word;
        }
        .editor-preview h1, .editor-preview h2, .editor-preview h3, .editor-preview h4, .editor-preview h5, .editor-preview h6 {
            color: var(--accent-color);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        .editor-preview p {
            margin-bottom: 1em;
        }
        .editor-preview ul, .editor-preview ol {
            padding-left: 2em;
            margin-bottom: 1em;
        }
        .editor-preview li {
            margin-bottom: 0.3em;
        }
        .editor-preview a {
            color: var(--secondary-accent);
            text-decoration: none;
        }
        .editor-preview a:hover {
            text-decoration: underline;
        }
        .editor-preview blockquote {
            border-left: 3px solid var(--border-color);
            padding-left: 1em;
            color: #aaa;
            font-style: italic;
            margin: 1.5em 0;
        }
        .editor-preview code {
            background: #2a2a2a;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: 'Courier New', Courier, monospace;
        }
        .editor-preview pre {
            background: #2a2a2a;
            padding: 1em;
            border-radius: 5px;
            overflow-x: auto;
        }
        .editor-preview pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
            font-size: 0.9em;
            color: #aaa;
        }
        .stats-bar div {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            padding: 15px;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
        }
        .action-bar button {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .action-bar button:hover {
            opacity: 0.9;
        }
        .action-bar button.secondary {
            background: var(--border-color);
            color: var(--text-color);
        }
        .action-bar button.secondary:hover {
            background: #555;
        }
        /* Responsive */
        @media (max-width: 768px) {
            .editor-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="editor-header">
            <div class="header-main">
                <h1>Blog Post Editor</h1>
                <p>Draft your next interstellar article</p>
            </div>
            <div class="header-actions">
                <button id="focusToggle" class="icon-btn" title="Toggle Focus Mode (Alt+F)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                </button>
            </div>
        </header>

        <div class="editor-wrapper">
            <div class="editor-panel">
                <div class="toolbar" id="toolbar">
                    <button id="boldBtn" class="tool-btn" title="Bold (Ctrl+B)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
                    </button>
                    <button id="italicBtn" class="tool-btn" title="Italic (Ctrl+I)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
                    </button>
                    <button id="headerBtn" class="tool-btn" title="Header (Ctrl+H)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 4v16M18 4v16M6 12h12"/></svg>
                    </button>
                    <div class="v-divider"></div>
                    <button id="listBtn" class="tool-btn" title="List (Ctrl+L)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    </button>
                    <button id="quoteBtn" class="tool-btn" title="Quote (Ctrl+Q)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 21c3 0 7-1 7-8V5H3v8h4c0 2-2 4-4 4"/><path d="M13 21c3 0 7-1 7-8V5h-7v8h4c0 2-2 4-4 4"/></svg>
                    </button>
                    <button id="codeBtn" class="tool-btn" title="Code Block (Ctrl+K)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                    </button>
                    <div class="v-divider"></div>
                    <button id="linkBtn" class="tool-btn" title="Link (Ctrl+K)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    </button>
                    <button id="imageBtn" class="tool-btn" title="Image (Ctrl+G)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </button>
                    <div class="flex-grow"></div>
                    <button id="aiPolishBtn" class="ai-polish-btn" title="AI Polish (Alt+N)">
                        <span class="pulse-dot"></span>
                        AI Polish
                    </button>
                </div>
                <textarea id="editor" placeholder="# Your Post Title

                                Write your amazing interstellar blog post here...

                                Use the toolbar above or markdown syntax."></textarea>
                <div class="stats-bar">
                    <div>Words: <span id="wordCount">0</span></div>
                    <div>Reading time: <span id="readTime">0</span> min read</div>
                    <div class="model-badge">
                        <span class="pulse-dot"></span>
                    AI Assistant: <span class="model-name">Vision Engine</span>
                    </div>
                </div>
            </div>

            <div class="editor-panel">
                <div class="toolbar">
                    <span>Live Preview</span>
                </div>
                <div id="preview" class="editor-preview">
                    <!-- Preview content will be inserted here -->
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button id="clearBtn" class="secondary">Clear Draft</button>
            <button id="saveBtn">Save as Post (.md)</button>
        </div>
    </div>

    <!-- Load markdown-it and highlight.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.7.0/lib/highlight.min.js"></script>
    <script src="assets/js/editor.js"></script>
</body>
</html>
