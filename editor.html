<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Editor</title>
    <link rel="stylesheet" href="assets/css/editor.css">
    <style>
        /* We'll also include some basic styles here for the editor container */
        :root {
            --bg-color: #0a0a0a;
            --text-color: #e0e0e0;
            --accent-color: #4cc9f0;
            --secondary-accent: #f72585;
            --border-color: #333;
            --input-bg: #1a1a1a;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        header h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
        }
        .editor-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .editor-panel {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
        }
        .toolbar button {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toolbar button:hover {
            background: var(--border-color);
        }
        .toolbar button.active {
            background: var(--accent-color);
            color: var(--bg-color);
        }
        .editor-input, .editor-preview {
            flex: 1;
            min-height: 300px;
            padding: 15px;
            overflow-y: auto;
        }
        .editor-input {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.6;
            background: var(--input-bg);
            color: var(--text-color);
            border: none;
            resize: none;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }
        .editor-preview {
            background: var(--input-bg);
            color: var(--text-color);
            line-height: 1.7;
            word-wrap: break-word;
        }
        .editor-preview h1, .editor-preview h2, .editor-preview h3, .editor-preview h4, .editor-preview h5, .editor-preview h6 {
            color: var(--accent-color);
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        .editor-preview p {
            margin-bottom: 1em;
        }
        .editor-preview ul, .editor-preview ol {
            padding-left: 2em;
            margin-bottom: 1em;
        }
        .editor-preview li {
            margin-bottom: 0.3em;
        }
        .editor-preview a {
            color: var(--secondary-accent);
            text-decoration: none;
        }
        .editor-preview a:hover {
            text-decoration: underline;
        }
        .editor-preview blockquote {
            border-left: 3px solid var(--border-color);
            padding-left: 1em;
            color: #aaa;
            font-style: italic;
            margin: 1.5em 0;
        }
        .editor-preview code {
            background: #2a2a2a;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: 'Courier New', Courier, monospace;
        }
        .editor-preview pre {
            background: #2a2a2a;
            padding: 1em;
            border-radius: 5px;
            overflow-x: auto;
        }
        .editor-preview pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
            font-size: 0.9em;
            color: #aaa;
        }
        .stats-bar div {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .action-bar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            padding: 15px;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
        }
        .action-bar button {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .action-bar button:hover {
            opacity: 0.9;
        }
        .action-bar button.secondary {
            background: var(--border-color);
            color: var(--text-color);
        }
        .action-bar button.secondary:hover {
            background: #555;
        }
        /* Responsive */
        @media (max-width: 768px) {
            .editor-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Blog Post Editor</h1>
            <p>Draft your next interstellar article</p>
        </header>

        <div class="editor-wrapper">
            <div class="editor-panel">
                <div class="toolbar" id="toolbar">
                    <button id="boldBtn" title="Bold (Ctrl+B)">**</button>
                    <button id="italicBtn" title="Italic (Ctrl+I)">*</button>
                    <button id="headerBtn" title="Header (Ctrl+H)">H2</button>
                    <button id="listBtn" title="List (Ctrl+L)">- List</button>
                    <button id="quoteBtn" title="Quote (Ctrl+Q)">> Quote</button>
                    <button id="codeBtn" title="Code Block (Ctrl+K)">Code</button>
                    <button id="linkBtn" title="Link (Ctrl+Link)">Link</button>
                    <button id="imageBtn" title="Image (Ctrl+G)">Image</button>
                </div>
                <textarea id="editor" placeholder="# Your Post Title

                                Write your amazing interstellar blog post here...

                                Use the toolbar above or markdown syntax."></textarea>
                <div class="stats-bar">
                    <div>Words: <span id="wordCount">0</span></div>
                    <div>Reading time: <span id="readTime">0</span> min read</div>
                </div>
            </div>

            <div class="editor-panel">
                <div class="toolbar">
                    <span>Live Preview</span>
                </div>
                <div id="preview" class="editor-preview">
                    <!-- Preview content will be inserted here -->
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button id="clearBtn" class="secondary">Clear Draft</button>
            <button id="saveBtn">Save as Post (.md)</button>
        </div>
    </div>

    <!-- Load markdown-it and highlight.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.7.0/lib/highlight.min.js"></script>
    <script src="assets/js/editor.js"></script>
</body>
</html>
