<!DOCTYPE html>
<html lang="en-GH" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education News | Vision Education</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        navy: '#05080f',
                        vibrantBlue: '#6366f1',
                        emerald: '#10b981',
                        darkGray: '#1e293b',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans text-navy antialiased">

    <!-- Header (Updated by fix2.js) -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-emerald-500 to-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-lg">V</div>
                <span class="font-bold text-xl tracking-tight text-navy">Vision Education</span>
            </a>
            <nav class="hidden md:flex gap-8 items-center text-sm font-semibold">
                <a href="index.html" class="text-navy hover:text-vibrantBlue transition-colors">Platform</a>
                <a href="articles.html" class="text-navy hover:text-vibrantBlue transition-colors">Articles</a>
                <a href="news.html" class="text-vibrantBlue">News</a>
            </nav>
            <a href="https://visionedu.online" target="_blank" class="px-5 py-2.5 bg-navy text-white font-bold rounded-xl text-sm hover:shadow-lg transition-all">Visit Platform</a>
        </div>
    </header>

    <main class="pt-20 pb-20 px-6 max-w-7xl mx-auto">
        
        <!-- Hero Section -->
        <section class="mb-16 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold text-navy tracking-tight mb-4">
                Trending <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-emerald-500">Education News</span>
            </h1>
            <p class="text-gray-500 text-lg max-w-2xl mx-auto italic">Real-time headlines and insights curated for Ghanaian students.</p>
        </section>

        <!-- News Grid / Loading State -->
        <div id="newsContainer" class="min-h-[400px] relative">
            <!-- Simple Loading State -->
            <div id="loading" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-gray-50/80 rounded-3xl">
                <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-indigo-600 font-semibold animate-pulse">Fetching latest updates...</p>
            </div>

            <!-- News Cards will be injected here -->
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 opacity-0 transition-opacity duration-1000">
                <!-- Template Card -->
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-navy py-12 border-t border-white/10">
        <div class="max-w-7xl mx-auto px-4 text-center">
          <div class="flex justify-center mb-4">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-emerald-500 flex items-center justify-center text-white font-bold">V</div>
          </div>
          <p class="text-sm text-gray-500">&copy; 2026 Yaw Ndaase Mensuoh. Built for the students of Ghana.</p>
        </div>
    </footer>

    <script>
        const newsGrid = document.getElementById('newsGrid');
        const loading = document.getElementById('loading');
        const newsContainer = document.getElementById('newsContainer');

        async function fetchNews() {
            try {
                const response = await fetch('/api/news');
                const data = await response.json();

                if (data.news && Array.isArray(data.news)) {
                    renderNews(data.news);
                } else {
                    throw new Error('Invalid format');
                }
            } catch (error) {
                console.error('Fetch Error:', error);
                newsGrid.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <h3 class="text-xl font-bold text-red-500">Unable to load news</h3>
                        <p class="text-gray-500">Please check back again later.</p>
                        <button onclick="fetchNews()" class="mt-4 px-4 py-2 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition-colors">Retry</button>
                    </div>
                `;
                newsGrid.style.opacity = '1';
                loading.style.display = 'none';
            }
        }

        function renderNews(news) {
            newsGrid.innerHTML = news.map((item, index) => `
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex flex-col cursor-pointer">
                    <div class="flex justify-between items-center mb-6">
                        <span class="px-3 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-bold uppercase tracking-wider rounded-full">${item.category}</span>
                        <span class="text-gray-400 text-xs font-semibold">${item.readTime} read</span>
                    </div>
                    <h3 class="text-xl font-bold text-navy mb-4 leading-snug hover:text-vibrantBlue transition-colors">${item.title}</h3>
                    <p class="text-gray-500 text-sm leading-relaxed mb-6 flex-1">${item.summary}</p>
                    <div class="pt-6 border-t border-gray-100 flex items-center justify-between">
                        <span class="text-[10px] font-mono text-gray-400 uppercase tracking-tighter">Powered by Vision AI</span>
                        <div class="text-indigo-600">
                             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        </div>
                    </div>
                </div>
            `).join('');

            loading.style.display = 'none';
            newsGrid.style.opacity = '1';
        }

        // Init
        document.addEventListener('DOMContentLoaded', fetchNews);
    </script>
</body>
</html>
